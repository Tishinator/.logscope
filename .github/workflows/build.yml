name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore LogScope.sln

      - name: Build
        run: dotnet build LogScope.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/LogScope.Core.Tests --configuration Release --no-build --verbosity normal
